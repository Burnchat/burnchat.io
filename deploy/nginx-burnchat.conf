# /etc/nginx/sites-available/burnchat
# PRIVACY: access_log off — no request logging

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name chat.example.com;   # ← change this
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chat.example.com;   # ← change this

    # SSL (managed by certbot — run: sudo certbot --nginx -d chat.example.com)
    # ssl_certificate     /etc/letsencrypt/live/chat.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/chat.example.com/privkey.pem;

    # ── PRIVACY: zero logging ─────────────────────
    access_log  off;
    error_log   /dev/null;

    # ── Security headers ──────────────────────────
    add_header X-Content-Type-Options    nosniff;
    add_header X-Frame-Options           DENY;
    add_header Referrer-Policy           no-referrer;
    add_header Content-Security-Policy   "default-src 'self'; connect-src 'self' wss://$host; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'";
    server_tokens off;

    # ── Rate limiting ─────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_req_zone  $binary_remote_addr zone=req_limit:10m rate=10r/s;

    # ── WebSocket + app proxy ─────────────────────
    location / {
        limit_conn conn_limit 10;
        limit_req  zone=req_limit burst=20 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # Timeouts (critical for long-lived WebSocket connections)
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;

        # Disable buffering for real-time
        proxy_buffering off;

        # Forward real IP
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
